name: Deploy ACCD-CP1 Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            EnvironmentPeople-EmoSafe/package-lock.json
            Co-labs/package-lock.json

      - name: Install dependencies
        working-directory: EnvironmentPeople-EmoSafe
        run: npm ci

      - name: Build static export
        working-directory: EnvironmentPeople-EmoSafe
        env:
          NEXT_PUBLIC_BASE_PATH: "/ACCD-CP1/EnvironmentPeople-EmoSafe"
        run: npm run export

      - name: Install dependencies (Co-labs)
        working-directory: Co-labs
        run: npm ci

      - name: Build static export (Co-labs)
        working-directory: Co-labs
        env:
          NEXT_PUBLIC_BASE_PATH: "/ACCD-CP1/Co-labs"
        run: npm run export

      - name: Assemble Pages site
        run: |
          mkdir -p site

          # Copy everything in the repo into the published site,
          # but exclude the Next project sources and GitHub metadata.
          rsync -av \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "EnvironmentPeople-EmoSafe" \
            --exclude "Co-labs" \
            --exclude "**/node_modules" \
            --exclude "**/.next" \
            --exclude "**/out" \
            ./ site/

          # Add the exported prototype under /EnvironmentPeople-EmoSafe/
          mkdir -p site/EnvironmentPeople-EmoSafe
          cp -R EnvironmentPeople-EmoSafe/out/* site/EnvironmentPeople-EmoSafe/

          # Add the exported prototype under /Co-labs/
          mkdir -p site/Co-labs
          cp -R Co-labs/out/* site/Co-labs/

          # Important for Next static assets on Pages
          touch site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4